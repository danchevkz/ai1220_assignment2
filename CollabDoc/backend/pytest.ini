[pytest]
testpaths = tests
asyncio_mode = strict
filterwarnings =
    # y_py::YDoc is not `Send`; when a test's event loop is torn down the GC
    # can finalise a YDoc on a different thread, which y_py surfaces as a
    # RuntimeError through PytestUnraisableExceptionWarning. This is a harness
    # artifact at teardown, not a product bug.
    ignore::pytest.PytestUnraisableExceptionWarning
